<h2>Check Leave Status</h2>

<input type="text" id="searchName" placeholder="Enter Employee Name">

<button onclick="searchEmployee()">Search</button>

<table id="leaveTable">
<tr>
<th>Employee Name</th>
<th>Total Leave</th>
<th>Used Leave</th>
<th>Remaining Leave</th>
</tr>

</tr>

</table>

<script>
function searchEmployee() {

var input = document.getElementById("searchName").value.toLowerCase();
var table = document.getElementById("leaveTable");
var tr = table.getElementsByTagName("tr");

for (var i = 1; i < tr.length; i++) {

var td = tr[i].getElementsByTagName("td")[0];

if (td) {
var txt = td.textContent || td.innerText;

if (txt.toLowerCase().indexOf(input) > -1) {
tr[i].style.display = "";
} else {
tr[i].style.display = "none";
}
}

}

}
</script>
