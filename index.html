<!DOCTYPE html>
<html>

<head>
<title>Leave Portal</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

.header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
font-size:24px;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:30px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
}

iframe{
width:100%;
border:none;
}

</style>

</head>

<body>

<div class="header">
Employee Leave Portal
</div>

<div class="container">

<div class="card">

<h2>Apply for Leave</h2>

<iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfZ2MgEn7ACNxn5bNxTfACYqLHvjZP6f2G44XH8J0lrI1-fqw/viewform?embedded=true" width="640" height="1193" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>

</div>

<div class="card">

<h2>Check Leave Status</h2>

<input type="text" id="searchName" placeholder="Enter Employee Name">

<button onclick="filterLeave()">Search</button>

<iframe id="leaveFrame"
src="YOUR_SHEET_PUBLISH_LINK"
width="100%"
height="400"></iframe>

<script>
function filterLeave() {
  var name = document.getElementById("searchName").value.toLowerCase();
  var frame = document.getElementById("leaveFrame");

  frame.contentWindow.find(name);
}
</script>
<iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQfSVau9TLfp3788MfwbR3ZiNmoWgOGeS7HdkDKBt_5BQZ37b0lz9HLOgspYeagtS-rWuGEZnRbPneJ/pubhtml?gid=1951069045&amp;single=true&amp;widget=true&amp;headers=false"></iframe>
