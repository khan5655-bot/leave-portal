<!DOCTYPE html>
<html>

<head>
<title>Leave Application</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
padding:40px;
}

form{
background:white;
padding:25px;
width:350px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
}

button{
background:#2e86de;
color:white;
padding:10px;
border:none;
width:100%;
}

</style>

</head>

<body>

<form>

<h2>Leave Application</h2>

<label>Employee Name</label>
<input type="text">

<label>Leave Type</label>
<select>
<option>Sick Leave</option>
<option>Casual Leave</option>
<option>Paid Leave</option>
</select>

<label>Start Date</label>
<input type="date">

<label>End Date</label>
<input type="date">

<label>Reason</label>
<textarea></textarea>

<button>Submit</button>

</form>

</body>
</html>
